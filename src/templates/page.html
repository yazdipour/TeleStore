<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TeleStore</title>
  <style>
    :root {
      --ink: #1f2933;
      --paper: #ffffff;
      --line: #d9e2ec;
      --muted: #65758b;
      --accent: #2563eb;
      --danger: #b42318;
    }

    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    a { color: inherit; }
    button, input { font: inherit; }
    button {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      border-radius: 6px;
      cursor: pointer;
      min-height: 42px;
      padding: 0 14px;
      font-weight: 700;
    }
    button:hover { background: #1d4ed8; }
    input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: var(--ink);
      padding: 10px 12px;
    }
    input:focus { outline: 2px solid rgba(37, 99, 235, 0.18); border-color: var(--accent); }
    code {
      display: inline-block;
      max-width: 100%;
      padding: 3px 6px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #f8fafc;
      color: #334257;
      overflow-wrap: anywhere;
    }
    form, ul { margin: 0; }
    ul { padding-left: 0; list-style: none; }
    body > h1, body > p, body > form {
      width: min(520px, calc(100vw - 32px));
      margin-left: auto;
      margin-right: auto;
    }
    body > h1 { margin-top: 40px; }
    body > form {
      display: grid;
      gap: 12px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
    }
    .error { color: var(--danger); font-weight: 800; }

    .app-shell {
      width: min(1120px, calc(100vw - 32px));
      margin: 32px auto;
    }
    .app-header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      padding: 0 0 18px;
      border-bottom: 1px solid var(--line);
    }
    .eyebrow {
      margin: 0 0 6px;
      color: var(--accent);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    h1, h2 { letter-spacing: 0; line-height: 1.2; }
    h1 { margin: 0; font-size: 2rem; }
    h2 { margin: 0; font-size: 1rem; }
    .status {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.86rem;
      font-weight: 700;
      background: #fff;
    }
    .status.ready { color: var(--accent); }
    .status.pending { color: var(--danger); }
    .notice {
      margin: 18px 0 0;
      border-radius: 6px;
      padding: 12px 14px;
      font-weight: 700;
    }
    .notice.error { border: 1px solid rgba(165, 40, 44, 0.3); background: rgba(165, 40, 44, 0.08); color: var(--danger); }
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-top: 18px;
    }
    .add-channel-form {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .add-channel-form input {
      flex: 1;
      margin: 0;
    }
    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 18px;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }
    .count {
      display: inline-grid;
      place-items: center;
      min-width: 32px;
      height: 28px;
      border-radius: 999px;
      background: #eff6ff;
      border: 1px solid #dbeafe;
      color: var(--accent);
      font-weight: 700;
      font-size: 0.85rem;
    }
    .source-list { display: grid; gap: 12px; }
    .source-card {
      display: grid;
      grid-template-columns: 52px minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px;
      border: 1px solid var(--line);
      border-left: 3px solid var(--source-tint, var(--accent));
      border-radius: 8px;
      background: #fff;
    }
    .source-card:hover { border-color: #cbd5e1; }
    .source-icon {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--line);
      background: #f8fafc;
    }
    .source-name { font-weight: 700; font-size: 1rem; }
    .source-meta { color: var(--muted); font-size: 0.9rem; }
    .source-url { display: block; margin-top: 6px; text-decoration: none; }
    .source-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: end; }
    .source-actions form { display: inline; }
    .remove-button {
      background: transparent;
      color: var(--danger);
      border-color: rgba(165, 40, 44, 0.35);
    }
    .form-grid { display: grid; gap: 12px; }
    label { display: grid; gap: 8px; color: var(--muted); font-weight: 700; }
    label span { font-size: 0.9rem; }
    .panel-copy { margin: 0; color: var(--muted); }
    .text-link {
      display: inline-block;
      margin-top: 12px;
      font-weight: 700;
      color: var(--accent);
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 24px;
      color: var(--muted);
      background: #f8fafc;
    }

    @media (max-width: 820px) {
      .app-shell { width: min(100% - 24px, 680px); margin: 24px auto; }
      .app-header { align-items: start; flex-direction: column; }
      .source-card { grid-template-columns: 48px minmax(0, 1fr); }
      .source-actions { grid-column: 1 / -1; justify-content: start; }
      .add-channel-form { flex-direction: column; align-items: stretch; }
    }
  </style>
  <script>
    async function copySourceUrl(button, url) {
      try {
        await navigator.clipboard.writeText(url);
        button.textContent = "Copied";
      } catch (error) {
        const input = document.createElement("input");
        input.value = url;
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
        button.textContent = "Copied";
      }
      setTimeout(() => button.textContent = "Copy", 1400);
    }
  </script>
</head>
<body><!--BODY--></body>
</html>
